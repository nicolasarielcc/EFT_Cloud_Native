name: Build and Push Docker Image

on: 
  push:
    branches:
      - main   
  pull_request:
    branches:
      - main

jobs: 
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # Paso 2: Autenticar en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen de Docker
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cursosonline-producer:latest \
            ./cursosonline-producer
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cursosonline-consumer:latest \
            ./cursosonline-consumer

      # Paso 4: Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cursosonline-producer:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cursosonline-consumer:latest

      # Paso 5: Configurar credenciales de AWS para SSH, incluyendo AWS_SESSION_TOKEN
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # Paso 5.5: 
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa


      # Paso 6: Conectarse a EC2 y desplegar el contenedor
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Autenticar en DockerHub desde EC2
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            # Descargar la última versión de la imagen
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cursosonline-producer:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cursosonline-consumer:latest
            # RabbitMQ
            docker pull rabbitmq:3-management
            docker network create cloud-network || true
            docker stop rabbitmq || true
            docker rm rabbitmq || true
            
            docker run -d \
            --name rabbitmq \
            --network cloud-network \
            --restart unless-stopped \
            -p 5672:5672 \
            -p 15672:15672 \
            rabbitmq:3-management
            
            # Parar y eliminar cualquier contenedor previo
            docker stop cursosonline-producer || true && docker rm cursosonline-producer || true
            docker stop cursosonline-consumer || true && docker rm cursosonline-consumer || true
            # Iniciar el contenedor
            docker run -d --name cursosonline-producer -v /mnt/efs:/app/efs -p 8080:8080\
            --network cloud-network \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID}}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY}}" \
            -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN}}" \
            -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET}}" \
            -e AWS_EC2_URL_CONSUMER="${{ secrets.AWS_EC2_URL_CONSUMER }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/cursosonline-producer:latest
          
            docker run -d --name cursosonline-consumer -v /mnt/efs:/app/efs -p 8081:8081\
            --network cloud-network \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID}}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY}}" \
            -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN}}" \
            -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET}}" \
            -e AWS_EC2_URL_PRODUCER="${{ secrets.AWS_EC2_URL_PRODUCER }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/cursosonline-consumer:latest
          EOF
